<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Вход</h1>
    <form id="loginForm">
        <label for="login_username">Имя пользователя</label>
        <input type="text" id="login_username" placeholder="Введите юзернейм" required>

        <label for="login_password">Пароль</label>
        <input type="password" id="login_password" placeholder="Введите пароль" required>

        <button type="submit">Войти</button>
        <button type="button" class="switch-page" onclick="window.location.href='registration.html'">Регистрация</button>
    </form>
</div>
<script src="js/login.js"></script>
</body>
</html>
