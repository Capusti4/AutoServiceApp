</head>
<body>

        <p>Введите предварительную цену:</p>
        <label for="preliminaryPriceInput"></label><input type="text" id="preliminaryPriceInput">
        <button onclick="submitPreliminaryPrice()">OK</button>

</div>

<div class="modal" id="final-price-input-modal" style="display:none;">
    <div class="modal-content">
        <p>Введите финальную цену:</p>
        <label for="finalPriceInput"></label><input type="text" id="finalPriceInput">
        <button onclick="submitFinalPrice()">OK</button>
    </div>
</div>


<div id="orders"></div>
<button onclick="window.location.href='index.html'">Назад</button>
</body>
<script src="js/orders_script.js"></script>
