<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="modal" id="preliminary-price-input-modal" style="display:none;">
    <div class="modal-content">
        <p>Введите предварительную цену:</p>
        <label for="preliminaryPriceInput"></label>
        <input type="number" id="preliminaryPriceInput" placeholder="Сумма...">
        <button onclick="submitPreliminaryPrice()">Подтвердить</button>
    </div>
</div>

<div class="modal" id="final-price-input-modal" style="display:none;">
    <div class="modal-content">
        <p>Введите финальную цену:</p>
        <label for="finalPriceInput"></label>
        <input type="number" id="finalPriceInput" placeholder="Сумма...">
        <button onclick="submitFinalPrice()">Завершить заказ</button>
    </div>
</div>

<div class="container container-large">
    <h1>Заказы</h1>
    <div id="orders"></div>
    <button class="btn-secondary" style="max-width: 200px;" onclick="window.location.href='index.html'">Назад на главную</button>
</div>

<div class="modal" id="feedback-modal" style="display:none;">
    <div class="modal-content">
        <p><b>Оставить отзыв</b></p>

        <label for="feedback-rating">Оценка (от 1 до 5):</label>
        <select id="feedback-rating" style="margin-bottom: 1rem;">
            <option value="5">5 ★★★★★</option>
            <option value="4">4 ★★★★</option>
            <option value="3">3 ★★★</option>
            <option value="2">2 ★★</option>
            <option value="1">1 ★</option>
        </select>

        <label for="feedback-comment">Комментарий (необязательно):</label>
        <textarea id="feedback-comment" placeholder="Напишите пару слов..."></textarea>

        <button onclick="submitFeedback()">Отправить отзыв</button>
        <button class="btn-secondary" onclick="closeFeedbackModal()">Отмена</button>
    </div>
</div>

<div class="modal" id="view-feedbacks-modal" style="display:none;">
    <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
        <p><b id="view-feedbacks-title">Отзывы о пользователе</b></p>
        <div id="user-feedbacks-container" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; text-align: left;">
        </div>
        <button class="btn-secondary" onclick="closeViewFeedbacksModal()">Закрыть</button>
    </div>
</div>

<script src="js/orders_script.js"></script>
</body>
</html>
